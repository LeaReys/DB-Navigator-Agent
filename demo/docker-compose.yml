services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dbnav-mssql
    hostname: dbnav-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "Demo_Strong_Password_123!"
    ports:
      - "14333:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  init-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dbnav-mssql-init
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "Demo_Strong_Password_123!"
    volumes:
      - ./init.sql:/scripts/init.sql:ro
    command: >
      bash -c "/opt/mssql-tools18/bin/sqlcmd
      -S mssql
      -U sa
      -P \"$$MSSQL_SA_PASSWORD\"
      -C
      -i /scripts/init.sql"

volumes:
  mssql_data: