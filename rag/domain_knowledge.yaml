# =============================================================
# Доменные знания о БД (db_proglib) — то, чего НЕТ в самой базе.
#
# Зачем файл:
#   - синонимы: оператор говорит "должник", в БД таблица "person";
#   - связи: в БД нет ни одного FOREIGN KEY, связи только неявные
#            (parent_id, bank_id, r_passport_id, obj_id) — описываем их тут;
#   - enum-поля: status/typ/code — это int со ссылкой в dict, объясняем смысл.
#
# Источник истины для ОПИСАНИЙ ПОЛЕЙ — MS_Description в самой БД.
# Этот файл их НЕ дублирует, а дополняет тем, что в схему не положишь.
#
# Как используется:
#   rag/indexer.py читает файл и подмешивает synonyms + business_description
#   + relationships в текст чанка ПЕРЕД векторизацией. 
#
#   После правки файла обязательно переиндексировать:  
#       python -m rag.indexer --force
# =============================================================

database: db_proglib
domain: "Взыскание задолженности (collection / ПКО / коллекторское агентство)"

tables:

  person:
    business_description: >
      Физические лица и ИП — должники.
      Каждая персона может иметь несколько долгов (debt) и один паспорт (passport).
    synonyms: [должник, должники, человек, персона, физлицо, заёмщик, клиент, контрагент, фио, ип, индивидуальный предприниматель, заемщик]
    relationships:
      - "person.id  <-  debt.parent_id        (1 персона — N долгов)"
      - "person.r_passport_id  ->  passport.id (1 персона — 1 паспорт)"
    field_hints:
      f: "Фамилия"
      i: "Имя"
      o: "Отчество"
      sex: "Пол: 'м' или 'ж' (одиночный символ)"
      birth_date: "Дата рождения (для возраста: DATEDIFF(YEAR, birth_date, GETDATE()))"

  debt:
    business_description: >
      Кредиты/займы/просроченная задолженность/долги/обязательства по персонам.
      Связан с должником (parent_id) и банком-кредитором (bank_id).
    synonyms: [долг, долги, задолженность, кредит, займ, просрочка, ссуда, обязательство]
    relationships:
      - "debt.parent_id  ->  person.id  (чей это долг)"
      - "debt.bank_id    ->  bank.id    (какой банк выдал)"
    enum_fields:
      status:
        description: "Статус долга. int со ссылкой на dict (dict_name code = 6 'Статус долга')."
        how_to_decode: >
          JOIN dict d ON d.code = debt.status
          (при необходимости фильтровать dict по словарю «Статус долга»)
    field_hints:
      debt_sum: "Сумма к погашению (остаток)"
      total_sum: "Полный размер кредита"
      start_date: "Дата выхода на просрочку"
      deadline: "Крайний срок погашения"

  bank:
    business_description: >
      Банки и МФО — кредиторы. Контактные и реквизитные данные организации.
    synonyms: [банк, банки, кредитор, мфо, мкк, организация, контрагент, займодавец]
    relationships:
      - "bank.id  <-  debt.bank_id  (1 банк — N долгов)"
    field_hints:
      INN: "ИНН организации"
      OGRN: "ОГРН организации"
      bank_phone: "Телефон банка"

  passport:
    business_description: >
      Паспортные данные персон. Привязка со стороны person.r_passport_id.
    synonyms: [паспорт, документ, удостоверение личности, серия и номер]
    relationships:
      - "passport.id  <-  person.r_passport_id  (1 паспорт — 1 персона)"

  doc_links:
    business_description: >
      Ссылки на файлы-вложения (сканы, договоры, расчёты) на диске.
      Полиморфная привязка: obj_id указывает на ТИП объекта (table_spec.id),
      r_id — на id записи в этой таблице. Пример: obj_id=8 (debt), r_id=4101019.
    synonyms: [документы, вложения, файлы, сканы, договоры, приложения]
    relationships:
      - "doc_links.obj_id  ->  table_spec.id  (к какой таблице привязан документ)"
      - "doc_links.r_id    ->  id записи в этой таблице"

  dict:
    business_description: >
      Универсальный справочник значений (enum-ы системы): статусы, типы, меню.
      Группируется по dict_name (parent_id).
    synonyms: [справочник, словарь, значения, коды, статусы, типы]
    relationships:
      - "dict.parent_id  ->  dict_name.id  (к какому словарю относится значение)"

  dict_name:
    business_description: "Описатель словарей: какие группы значений вообще есть (Статус долга, Тип контакта и т.д.)."
    synonyms: [описатель словаря, группы справочников, виды словарей]

  table_spec:
    business_description: "Метаданные: человекочитаемые описания таблиц БД."
    synonyms: [описатель таблиц, метаданные таблиц]

  column_spec:
    business_description: "Метаданные: человекочитаемые описания столбцов таблиц."
    synonyms: [описатель столбцов, метаданные полей]
    relationships:
      - "column_spec.parent_id  ->  table_spec.id"