<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DB Navigator · agent console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <button class="brand brand-button" id="homeBtn" type="button" aria-label="Вернуться на стартовую страницу">
      <svg class="brand-glyph" viewBox="0 0 32 32" aria-hidden="true">
        <circle cx="6"  cy="16" r="3.2" />
        <circle cx="16" cy="6"  r="3.2" />
        <circle cx="16" cy="26" r="3.2" />
        <circle cx="26" cy="16" r="3.2" />
        <path d="M8.6 14.4 13.4 8.6M18.6 8.6 23.4 14.4M23.4 17.6 18.6 23.4M13.4 23.4 8.6 17.6" />
      </svg>
      <div class="brand-text">
        <span class="wordmark">db<span class="dot">·</span>navigator</span>
        <span class="brand-sub">agent console</span>
      </div>
    </button>
    <div class="status" id="status" aria-live="polite">
      <span class="chip chip-loading">проверяю окружение…</span>
    </div>
  </header>

  <main class="chat" id="chat">
    <section class="empty" id="empty">
      <h1>Помощник по базам данных MS SQL Server</h1>
      <p>
        Задайте вопрос на естественном языке. Агент сам классифицирует запрос,
        вызовет нужные инструменты и покажет каждый шаг графа — от поиска таблиц
        до выполнения безопасного <code>SELECT</code>.
      </p>
      <div class="examples" id="examples">
        <button class="ex" data-q="В какой таблице хранится информация о долге?">
          <span class="ex-tag nav">navigation</span>
          В какой таблице хранится информация о долге?
        </button>
        <button class="ex" data-q="Покажи структуру таблицы debt">
          <span class="ex-tag schema">schema</span>
          Покажи структуру таблицы debt
        </button>
        <button class="ex" data-q="Напиши скрипт: список банков с их телефонами">
          <span class="ex-tag script">script</span>
          Напиши скрипт: список банков с телефонами
        </button>
        <button class="ex" data-q="Сколько всего записей в таблице person?">
          <span class="ex-tag data">data</span>
          Сколько всего записей в таблице person?
        </button>
      </div>
    </section>
  </main>

  <footer class="composer">
    <form id="form" autocomplete="off">
      <textarea
        id="input"
        rows="1"
        placeholder="Спросите про базу данных…  (Enter — отправить, Shift+Enter — перенос)"
      ></textarea>
      <button id="send" type="submit" aria-label="Отправить">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 12h14M13 6l6 6-6 6" />
        </svg>
      </button>
    </form>
    <p class="composer-note">
      режим <b>read-only</b> · запросы на изменение данных блокируются
    </p>
  </footer>

  <script src="/static/app.js"></script>
  <script>
  /* Резилиентная проверка окружения. Живёт в index.html (приезжает вместе
     с HTML), поэтому работает, даже если app.js долетел обрезанным.
     Таймаут + ретраи: чип никогда не висит «вечно» — либо статус, либо ошибка. */
  (function () {
    var statusEl = document.getElementById("status");
    if (!statusEl) return;
    function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
    function render(h){
      var s = h.servers || [];
      var dbOk = s.length > 0 && s.every(function(x){return x.ok;});
      var dbName = (s[0] && s[0].database) || "db";
      statusEl.innerHTML =
        '<span class="chip ' + (h.provider?"ok":"off") + '">' + esc(h.provider||"llm") + '</span>' +
        '<span class="chip ' + (dbOk?"ok":"bad") + ' hide-sm">db: ' + esc(dbName) + '</span>' +
        '<span class="chip ' + (h.rag_ready?"ok":"off") + ' hide-sm">rag</span>' +
        '<span class="chip ' + (h.langfuse?"live":"off") + ' hide-sm">langfuse</span>';
    }
    function load(attempt){
      attempt = attempt || 1;
      var ctrl = new AbortController();
      var timer = setTimeout(function(){ ctrl.abort(); }, 8000);
      fetch("/api/health", { signal: ctrl.signal, cache: "no-store" })
        .then(function(r){ clearTimeout(timer); return r.json(); })
        .then(render)
        .catch(function(){
          clearTimeout(timer);
          if (attempt < 4) {
            setTimeout(function(){ load(attempt + 1); }, attempt * 1500);
          } else {
            statusEl.innerHTML = '<span class="chip bad">сервер недоступен — повтор…</span>';
            setTimeout(function(){ load(1); }, 15000);  // самовосстановление
          }
        });
    }
    load();
  })();
  </script>
</body>
</html>
